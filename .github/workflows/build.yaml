name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get kubectl version
        id: version
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          echo "kubectl_version=${KUBECTL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "kubectl_version_short=${KUBECTL_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/helmforge/kubectl:latest
            docker.io/helmforge/kubectl:${{ steps.version.outputs.kubectl_version_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes docker.io/helmforge/kubectl@${DIGEST}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/helmforge/kubectl:latest
          format: table
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/helmforge/kubectl:latest
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-kubectl-${{ steps.version.outputs.kubectl_version_short }}
          path: sbom.json
