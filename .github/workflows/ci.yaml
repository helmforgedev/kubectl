name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: helmforge/kubectl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test kubectl version
        run: |
          docker run --rm helmforge/kubectl:ci version --client

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/kubectl:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability report (HIGH)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/kubectl:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/kubectl:ci
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-ci
          path: sbom.json
